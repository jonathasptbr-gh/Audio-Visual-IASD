<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AV Controle">
  <title>IASD AV — Controle</title>
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="controle.css">
</head>
<body>

  <header class="app-header">
    <div class="app-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1f6feb" stroke-width="2">
        <rect x="2" y="4" width="20" height="13" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        <polygon points="10,8 10,13 15,10.5" fill="#1f6feb" stroke="none"/>
      </svg>
      Controle
    </div>
    <div class="status-badge" id="status-badge">
      <div class="status-dot"></div>
      <span id="status-text">Display offline</span>
    </div>
  </header>

  <main class="main">

    <!-- Reprodução -->
    <div class="card">
      <div class="section-title">Reproduzindo</div>
      <div class="now-playing empty" id="now-playing">Nenhuma mídia selecionada</div>

      <div class="progress-wrap">
        <div class="time-row">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
        <input type="range" id="seek" min="0" max="1000" value="0" step="1" disabled>
      </div>

      <div class="transport">
        <button class="t-btn" id="btn-prev" title="Anterior" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="t-btn play" id="btn-play" title="Play/Pause" disabled>
          <svg id="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="#fff" style="display:none"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>
        <button class="t-btn" id="btn-next" title="Próxima" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-2 6L6 6v12z"/></svg>
        </button>
      </div>

      <div class="volume-row">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" stroke="none"/>
          <path d="M15.5 8.5a5 5 0 010 7M18 6a8 8 0 010 12"/>
        </svg>
        <input type="range" id="volume" min="0" max="100" value="100" step="1">
      </div>

      <button class="btn btn-secondary btn-blackout" id="btn-blackout">Tela Preta</button>
    </div>

    <!-- Biblioteca -->
    <div class="card">
      <div class="section-title">Biblioteca</div>
      <div class="library-list" id="library-list">
        <div class="library-empty" id="library-empty">Nenhuma mídia adicionada ainda.</div>
      </div>
      <button class="btn btn-primary" id="btn-add" style="margin-top:12px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Adicionar Mídia
      </button>
      <input type="file" id="file-input" accept="video/*,image/*" multiple>
    </div>

    <div class="hint">
      Abra o app <strong>Display</strong> na tela que será espelhada/transmitida na TV.
      Este controle conversa com ele localmente, sem internet.
    </div>

  </main>

  <footer class="app-footer">IASD AV · Controle Remoto</footer>

  <script src="db.js"></script>
  <script src="controle.js"></script>
</body>
</html>
