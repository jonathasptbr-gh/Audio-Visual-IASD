<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Controle AV</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="../shared/material-symbols.css">
  <link rel="stylesheet" href="controle.css">
</head>
<body>
  <header class="appbar">
    <span class="app-name">Audio Visual <b>IASD</b></span>
    <span class="app-version">Controle v1.4</span>
  </header>

  <main>
    <div class="list-header">
      <button id="backBtn" class="back-btn" hidden><span class="msym">&#xe5c4;</span></button>
      <span class="list-title" id="listTitle">Importados</span>
    </div>

    <ul id="library" class="lib-list"></ul>

    <!-- abas na base da seção de listas -->
    <div class="tabs">
      <button class="tab-pl" id="plBtn" title="Playlist">
        <span class="msym">&#xe03d;</span>
        <span id="plCount" class="pl-badge"></span>
      </button>
      <div class="tabs-divider"></div>
      <button class="tab active" data-tab="imports" title="Importados"><span class="msym">&#xe413;</span></button>
      <button class="tab" data-tab="folders" title="Pastas"><span class="msym">&#xe2c7;</span></button>
      <label class="tab-add" id="tabImport" title="Importar mídia">
        <span class="msym">&#xe2c8;</span>
        <input id="file" type="file" accept="image/*,video/*,audio/*" multiple hidden>
      </label>
      <button class="tab-add" id="tabNewFolder" title="Nova pasta" hidden>
        <span class="msym">&#xe2cc;</span>
      </button>
    </div>

    <!-- selbar substitui as abas durante a seleção múltipla -->
    <div id="selbar" class="selbar" hidden>
      <button id="selCancel" class="sel-btn" title="Cancelar"><span class="msym">&#xe14c;</span></button>
      <span id="selCount" class="sel-count">0</span>
      <span class="sel-spacer"></span>
      <button id="selFavToggle" class="sel-btn" title="Favoritar / Desfavoritar"><span class="msym">&#xe838;</span></button>
      <button id="selFolder" class="sel-btn" title="Salvar em pasta"><span class="msym">&#xe2c7;</span></button>
      <button id="selRename" class="sel-btn" title="Renomear"><span class="msym">&#xe150;</span></button>
      <button id="selDelete" class="sel-btn danger" title="Excluir"><span class="msym">&#xe872;</span></button>
    </div>
  </main>

  <!-- controles multimídia fixados na base -->
  <footer class="bottombar">
    <div class="deck">
      <div class="deck-main">
        <div class="preview" id="preview">
          <div class="pv-wall" id="pvWall"><span class="pv-brand">Audio Visual <b>IASD</b></span></div>
          <img id="pvImg" class="pv-layer" alt="" hidden>
          <video id="pvVideo" class="pv-layer" playsinline muted hidden></video>
        </div>
        <div class="nowplaying">
          <div class="np-name" id="npName">Nada em exibição</div>
          <div class="np-seek">
            <span id="curTime" class="np-time">0:00</span>
            <input type="range" id="seek" min="0" max="0" value="0" step="0.1" disabled>
            <span id="durTime" class="np-time">0:00</span>
          </div>
        </div>
        <div class="transport">
          <button id="prev" class="t-btn" title="Anterior"><span class="msym">&#xe045;</span></button>
          <button id="playpause" class="t-btn t-main" title="Play/Pause"><span class="msym">&#xe037;</span></button>
          <button id="stop" class="t-btn" title="Parar e limpar"><span class="msym">&#xe047;</span></button>
          <button id="next" class="t-btn" title="Seguinte"><span class="msym">&#xe044;</span></button>
          <button id="repeat" class="t-btn" title="Repetição"><span class="msym">&#xe040;</span></button>
        </div>
      </div>

      <!-- mixer: fader vertical + mudo + visual -->
      <div class="mixer">
        <div class="fader-wrap">
          <input type="range" id="volSlider" class="fader" min="0" max="100" value="100" aria-label="Volume da mídia">
        </div>
        <button id="muteToggle" class="ctl-btn mute-btn" title="Mudo (liga/desliga)"><span class="msym">&#xe050;</span></button>
        <button id="viewToggle" class="ctl-btn view-btn" title="Alternar Visual / Wallpaper"><span class="msym">&#xe251;</span></button>
      </div>
    </div>
  </footer>

  <!-- popup de playlist (bottom sheet) -->
  <div id="plPopup" class="popup-backdrop">
    <div class="popup-sheet">
      <div class="popup-header">
        <span class="msym popup-header-icon">&#xe03d;</span>
        <span class="popup-title">Playlist</span>
        <span id="plPopupCount" class="popup-count">0</span>
        <button id="plPopupClose" class="popup-close" title="Fechar"><span class="msym">&#xe14c;</span></button>
      </div>
      <ul id="playlist" class="popup-list"></ul>
    </div>
  </div>

  <!-- popup de seleção de pasta (bottom sheet) -->
  <div id="folderPopup" class="popup-backdrop">
    <div class="popup-sheet">
      <div class="popup-header">
        <span class="msym popup-header-icon">&#xe2c7;</span>
        <span class="popup-title">Salvar em pasta</span>
        <button id="folderPopupClose" class="popup-close" title="Fechar"><span class="msym">&#xe14c;</span></button>
      </div>
      <ul id="folderPickerList" class="popup-list"></ul>
      <div class="popup-footer">
        <button id="newFolderInPickerBtn" class="new-folder-btn">
          <span class="msym">&#xe2cc;</span> Nova pasta
        </button>
      </div>
    </div>
  </div>

  <script src="../shared/db.js"></script>
  <script src="../shared/stage.js"></script>
  <script src="controle.js"></script>
</body>
</html>
