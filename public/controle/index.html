<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1b5e20">
  <title>Controle AV</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="controle.css">
</head>
<body>
  <header class="topbar">
    <div class="transport">
      <button id="prev" class="t-btn" title="Anterior">⏮</button>
      <button id="playpause" class="t-btn t-main" title="Play/Pause">▶</button>
      <button id="stop" class="t-btn" title="Parar">⏹</button>
      <button id="next" class="t-btn" title="Seguinte">⏭</button>
    </div>

    <div class="nowplaying">
      <div class="np-name" id="npName">Nada em exibição</div>
      <div class="np-seek">
        <span id="curTime" class="np-time">0:00</span>
        <input type="range" id="seek" min="0" max="0" value="0" step="0.1" disabled>
        <span id="durTime" class="np-time">0:00</span>
      </div>
    </div>

    <div class="modes" id="modes">
      <button class="mode-btn" data-mode="wallpaper">🖼️ Wallpaper</button>
      <button class="mode-btn" data-mode="visual">🎬 Visual</button>
      <button class="mode-btn" data-mode="wallaudio">🔊 Wallpaper + Áudio</button>
    </div>
  </header>

  <main>
    <section class="toolbar">
      <label class="btn">
        + Importar mídia
        <input id="file" type="file" accept="image/*,video/*,audio/*" multiple hidden>
      </label>
      <button id="hide" class="btn btn-secondary">Limpar display</button>
    </section>

    <ul id="playlist" class="playlist"></ul>
  </main>

  <script src="../shared/db.js"></script>
  <script src="controle.js"></script>
</body>
</html>
