<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Display AV</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="../shared/material-symbols.css">
  <link rel="stylesheet" href="display.css">
</head>
<body>
  <div id="wallpaper" class="wallpaper">
    <div class="wallpaper-brand">Audio Visual <span>IASD</span></div>
  </div>

  <img id="img" class="layer" alt="" hidden>
  <video id="video" class="layer" playsinline hidden></video>
  <iframe id="youtube" class="layer yt-frame" hidden
          allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>

  <div id="unlock" class="unlock">
    <div class="unlock-box">
      <div class="unlock-icon"><span class="msym">&#xe037;</span></div>
      <p>Toque para ativar o display</p>
    </div>
  </div>

  <script src="../shared/db.js"></script>
  <script src="../shared/stage.js"></script>
  <script src="display.js"></script>
</body>
</html>
