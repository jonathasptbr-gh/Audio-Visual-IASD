<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AV Display">
  <title>IASD AV — Display</title>
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="display.css">
</head>
<body>

  <!-- Stage: vídeo ou imagem em tela cheia -->
  <div class="stage">
    <video id="video" playsinline webkit-playsinline></video>
    <img id="image" alt="">
  </div>

  <div class="blackout" id="blackout"></div>

  <!-- Botão de transmitir para a TV (Remote Playback API) -->
  <button class="cast-btn" id="cast-btn" title="Transmitir para a TV">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M2 16.1A5 5 0 015.9 20M2 12.05A9 9 0 019.95 20M2 8V6a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2h-6"/>
      <line x1="2" y1="20" x2="2.01" y2="20"/>
    </svg>
    Transmitir
  </button>

  <!-- Estado ocioso -->
  <div class="idle" id="idle">
    <div class="idle-logo">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="14" width="60" height="38" rx="5" stroke="#1f6feb" stroke-width="3"/>
        <line x1="24" y1="52" x2="24" y2="62" stroke="#1f6feb" stroke-width="3" stroke-linecap="round"/>
        <line x1="48" y1="52" x2="48" y2="62" stroke="#1f6feb" stroke-width="3" stroke-linecap="round"/>
        <line x1="18" y1="62" x2="54" y2="62" stroke="#1f6feb" stroke-width="3" stroke-linecap="round"/>
        <polygon points="28,24 28,44 48,34" fill="#1f6feb"/>
      </svg>
    </div>
    <div class="idle-title">IASD AV — Display</div>
    <div class="idle-sub">
      Pronto. Use o app <strong>Controle</strong> para escolher e reproduzir a mídia.
      Toque na tela uma vez para liberar a reprodução automática.
    </div>
  </div>

  <div class="pill" id="pill"><span class="pill-dot"></span><span id="pill-text">Controle conectado</span></div>

  <script src="db.js"></script>
  <script src="display.js"></script>
</body>
</html>
