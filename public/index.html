<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Visual IASD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1f12;
      color: #e8f0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: 1.5rem; }
    p { color: #7d937d; max-width: 34ch; line-height: 1.6; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    a {
      padding: 1rem 1.75rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      color: #fff;
    }
    .controle { background: #2e7d32; }
    .display { background: #1565c0; }
  </style>
</head>
<body>
  <h1>Audio Visual IASD</h1>
  <p>Dois aplicativos no mesmo domínio. Instale cada um separadamente no Android: o Display para espelhar via Miracast, o Controle para operar.</p>
  <div class="links">
    <a class="controle" href="controle/">Abrir Controle</a>
    <a class="display" href="display/">Abrir Display</a>
  </div>
</body>
</html>
