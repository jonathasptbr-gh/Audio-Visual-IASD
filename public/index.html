<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IASD AV">
  <title>IASD AV — Projeção</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Stage: the surface that gets mirrored to the TV -->
  <div class="stage">
    <img class="stage-image" id="stage-image" alt="">
  </div>

  <!-- Black-out overlay -->
  <div class="blackout" id="blackout"></div>

  <!-- Empty / start state -->
  <div class="empty-state" id="empty-state">
    <div class="empty-logo">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="14" width="60" height="38" rx="5" stroke="#1f6feb" stroke-width="3"/>
        <line x1="24" y1="52" x2="24" y2="62" stroke="#1f6feb" stroke-width="3" stroke-linecap="round"/>
        <line x1="48" y1="52" x2="48" y2="62" stroke="#1f6feb" stroke-width="3" stroke-linecap="round"/>
        <line x1="18" y1="62" x2="54" y2="62" stroke="#1f6feb" stroke-width="3" stroke-linecap="round"/>
        <polygon points="28,24 28,44 48,34" fill="#1f6feb"/>
      </svg>
    </div>
    <div class="empty-title">IASD AV — Projeção</div>
    <div class="empty-subtitle">
      Espelhe esta tela na TV (SmartView) e selecione uma imagem.
      Toque na tela para mostrar os controles.
    </div>
    <button class="btn btn-primary" id="btn-pick">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21,15 16,10 5,21"/>
      </svg>
      Selecionar Imagem
    </button>
  </div>

  <!-- Auto-hiding control bar -->
  <div class="controls" id="controls">
    <div class="counter" id="counter"></div>
    <div class="controls-row">
      <button class="ctrl-btn" id="btn-prev" title="Anterior" disabled>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="15,18 9,12 15,6"/>
        </svg>
        <span class="ctrl-label">Anterior</span>
      </button>
      <button class="ctrl-btn" id="btn-next" title="Próxima" disabled>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="9,6 15,12 9,18"/>
        </svg>
        <span class="ctrl-label">Próxima</span>
      </button>
      <button class="ctrl-btn danger" id="btn-black" title="Tela preta">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="12" cy="12" r="9"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/>
        </svg>
        <span class="ctrl-label">Tela Preta</span>
      </button>
      <button class="ctrl-btn" id="btn-add" title="Adicionar imagens">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span class="ctrl-label">Adicionar</span>
      </button>
    </div>
  </div>

  <div class="tap-hint" id="tap-hint">Toque na tela para abrir os controles</div>

  <input type="file" id="file-input" accept="image/*" multiple>

  <script src="js/app.js"></script>
</body>
</html>
