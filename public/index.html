<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AV Controle">
  <title>IASD AV — Controlador</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/controller.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="app-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="5" width="24" height="14" rx="2" stroke="#1f6feb" stroke-width="2"/>
        <line x1="10" y1="19" x2="10" y2="23" stroke="#1f6feb" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="19" x2="18" y2="23" stroke="#1f6feb" stroke-width="2" stroke-linecap="round"/>
        <line x1="7" y1="23" x2="21" y2="23" stroke="#1f6feb" stroke-width="2" stroke-linecap="round"/>
        <polygon points="11,9 11,15 17,12" fill="#1f6feb"/>
      </svg>
      IASD AV
    </div>
    <div class="status-badge" id="status-badge">
      <div class="status-dot"></div>
      <span id="status-text">Desconectado</span>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Warning: browser not supported -->
    <div class="not-supported" id="not-supported">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>Presentation API não suportada. Use Chrome ou Edge no desktop.</span>
    </div>

    <!-- Connection card -->
    <div class="card">
      <div class="section-title">Segunda Tela</div>
      <div class="connection-info">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span>Conecte um monitor ou TV para iniciar a projeção.</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-start">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          Iniciar Projeção
        </button>
        <button class="btn btn-danger" id="btn-stop" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          Parar
        </button>
      </div>
    </div>

    <!-- Image card -->
    <div class="card">
      <div class="section-title">Imagem</div>

      <!-- Drop zone (shown when no image) -->
      <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Selecionar imagem">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21,15 16,10 5,21"/>
        </svg>
        <span class="drop-zone-title">Selecionar Imagem</span>
        <span class="drop-zone-hint">Toque ou arraste uma imagem aqui<br>JPG, PNG, WebP, SVG (máx. 10MB)</span>
        <input type="file" id="file-input" accept="image/*">
      </div>

      <!-- Preview (shown when image loaded) -->
      <div class="preview-container" id="preview-container">
        <div class="preview-header">
          <span class="preview-name" id="preview-name"></span>
          <button class="btn-clear" id="btn-clear" title="Remover imagem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <img class="preview-image" id="preview-image" alt="Pré-visualização">
      </div>

      <!-- Send button -->
      <button class="btn btn-send" id="btn-send" disabled style="margin-top: 14px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          <polyline points="8,10 12,7 16,10"/>
        </svg>
        Enviar para a Tela
      </button>
    </div>

  </main>

  <footer class="app-footer">
    IASD AV · Projeção em Segunda Tela
  </footer>

  <script src="/js/controller.js"></script>
</body>
</html>
